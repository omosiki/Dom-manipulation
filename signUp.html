<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signUp.css">
    <script type="module" src="signUp.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Document</title>
</head>
<body>


  <div class="wrapper">
    <h2>Registration</h2>
    <form action="#" id="form">
      <div class="input-box">
        <input type="text" placeholder="Enter your name" required id="fullname">
      </div>
      <div class="input-box">
        <input type="email" placeholder="Enter your email" required id="email">
      </div>
      <div class="input-box">
        <input type="password" placeholder="Create password" required id="password">
      </div>
      <div class="input-box">
        <input type="password" placeholder="Confirm password" required id="confirmPassword">
      </div>
      <div class="policy"> 
        <input type="checkbox" id="checkboxG">
        <h3>I accept all terms & condition</h3>
      </div>
      <div class="input-box button">
        <input type="Submit" value="Register Now">
      </div>
      <div class="text">
        <h3>Already have an account? <a href="index.html"id="goLogin">Login now</a></h3>
      </div>
    </form>
  </div>


</body>
</html>
