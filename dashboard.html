<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dashboard.css">
    <title>Document</title>
</head>
<body>
    <div class="main-container">
    <!-- Author: FormBold Team -->
    <!-- Learn More: https://formbold.com -->
    <div class="form-wrapper">
        


        <form id="myform">
            <!-- Title and Description -->
            <div class="form-header">
                <h2 class="form-title">Get in Touch</h2>
                <p class="form-description">
                    Please fill out the form to get more information or book a
                    demo. All required fields are marked with *.
                </p>
            </div>

            <!-- Essential Fields -->
            <div class="form-group">
                <label for="fullname" class="form-label">Full Name*</label>
                <input
                    type="text"
                    name="fullname"
                    id="fullname"
                    class="form-input"
                    required
                />
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address*</label>
                <input
                    type="email"
                    name="email"
                    id="email"
                    class="form-input"
                    required
                />
            </div>

            <div class="form-group">
                <label for="phone" class="form-label"
                    >Phone Number (Optional)</label
                >
                <input type="tel" name="phone" id="phone" class="form-input" />
            </div>
            <div class="form-group">
                    
                <label for="dob" class="form-label">Date of Birth:</label>
                <input 
                    type="date" 
                    id="dob" 
                    class="form-input"
                    name="date_of_birth" 
                    required min="1900-01-01" max="2026-02-28">
                
            </div>
            <div class="form-group">
                <label for="company" class="form-label" >Nationality</label >
                <input
                    type="text"
                    name="nationality"
                    id="nationality"
                    class="form-input"
                />
            </div>

            <div class="form-group">
                <label for="job-title" class="form-label"
                    >Job Title (Optional)</label
                >
                <input
                    type="text"
                    name="job-title"
                    id="job-title"
                    class="form-input"
                />
            </div>
            <div class="form-group">
                <label for="attachment" class="form-label">Attachment (Optional)</label>
                <input
                    type="file"
                    name="attachment"
                    id="attachment"
                    class="form-input"
                    accept=".jpg,.jpeg,.png,.pdf,.docx"
                    required
                />
            </div>
            <div class="form-group">
                <label for="waec_result" class="form-label">Upload your WAEC result</label>
                <input
                    type="file" 
                    name="waec_result" 
                    id="waec_result" 
                    class="form-input"
                    accept=".jpg.jpeg.png.pdf" required
                />
                
            </div>
                       <div class="form-group">
                <label for="interest" class="form-label">Certificate Obtained</label>
                <select
                    name="interest"
                    id="interest"
                    class="form-select"
                    required
                >
                    <!-- <option value="product-demo">Product Demo</option> -->
                    <option value="wassce">WASSCE</option>
                    <option value="neco">NECO</option>
                    <option value="gce">GCE</option>
                    <option value="awaiting result">AWAITING RESULT</option>
                </select>
            </div>


            <div class="form-group">
                <label for="interest" class="form-label">Gender</label>
                <select
                    name="interest"
                    id="interest"
                    class="form-select"
                    required
                >
                    <!-- <option value="product-demo">Product Demo</option> -->
                    <option value="pricing">Male</option>
                    <option value="support">Female</option>
                </select>
            </div>
           
            <div class="form-group">
            <label for="state" class="form-label">State of origin</label>
                <select id="state" name="state" class="form-input" required>
                    <!-- <option value="">--Select State--</option> -->
                    <option value="Abia">Abia</option>
                    <option value="Adamawa">Adamawa</option>
                    <option value="Akwa Ibom">Akwa Ibom</option>
                    <option value="Anambra">Anambra</option>
                    <option value="Bauchi">Bauchi</option>
                    <option value="Bayelsa">Bayelsa</option>
                    <option value="Benue">Benue</option>
                    <option value="Borno">Borno</option>
                    <option value="Cross River">Cross River</option>
                    <option value="Delta">Delta</option>
                    <option value="Ebonyi">Ebonyi</option>
                    <option value="Edo">Edo</option>
                    <option value="Ekiti">Ekiti</option>
                    <option value="Enugu">Enugu</option>
                    <option value="FCT">Federal Capital Territory</option>
                    <option value="Gombe">Gombe</option>
                    <option value="Imo">Imo</option>
                    <option value="Jigawa">Jigawa</option>
                    <option value="Kaduna">Kaduna</option>
                    <option value="Kano">Kano</option>
                    <option value="Katsina">Katsina</option>
                    <option value="Kebbi">Kebbi</option>
                    <option value="Kogi">Kogi</option>
                    <option value="Kwara">Kwara</option>
                    <option value="Lagos">Lagos</option>
                    <option value="Nasarawa">Nasarawa</option>
                    <option value="Niger">Niger</option>
                    <option value="Ogun">Ogun</option>
                    <option value="Ondo">Ondo</option>
                    <option value="Osun">Osun</option>
                    <option value="Oyo">Oyo</option>
                    <option value="Plateau">Plateau</option>
                    <option value="Rivers">Rivers</option>
                    <option value="Sokoto">Sokoto</option>
                    <option value="Taraba">Taraba</option>
                    <option value="Yobe">Yobe</option>
                    <option value="Zamfara">Zamfara</option>
                </select>

             </div>
             <div class="form-group">
                    <label for="local-govt" class="form-label">Local Government Area:</label>
                    <input type="text"
                    id="lga"
                    name="lga"  
                    class="form-input"
                    placeholder="Enter your LGA">
             </div>
              <div class="form-group">
                <label for="message" class="form-label"
                    >Message / Inquiry (Optional)</label
                >
                <textarea
                    name="message"
                    id="message"
                    rows="4"
                    class="form-textarea"
                ></textarea>
            </div>
            <!-- Compliance & Consent -->
            <div class="consent-group">
                <input
                    type="checkbox"
                    id="consent"
                    class="form-checkbox"
                    required
                />
                <label for="consent" class="consent-label">
                    I agree to receive communications about products, services,
                    and updates.
                </label>
            </div>

            <!-- Optional Privacy Policy and GDPR Notice -->
            <div class="privacy-links">
                <a href="#">Privacy Policy</a> 
                <a href="#">GDPR Notice</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">Submit Inquiry</button>
        </form>
    </div>
</div>

  


</div>
<script src="getInTouch.js" defer></script>

</body>
</html>
